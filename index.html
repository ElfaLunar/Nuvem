<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nuvem Celestial - Chuva de Dados</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            background-color: black;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .info {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(180, 220, 255, 0.7);
            font-size: 12px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
            background: rgba(0,0,0,0.3);
            padding: 6px 14px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">✨ NUVEM LUMINOSA | CHUVA DE CÓDIGO ✨</div>

    <script>
        (function() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            let width, height;
            
            // Posição da nuvem
            let cloudX, cloudY;
            const cloudBaseY = 0.28;
            
            // ========== NUVEM REDESENHADA - SEM BRILHOS DOURADOS ==========
            function drawBeautifulCloud() {
                const centerX = cloudX;
                const centerY = cloudY + Math.sin(Date.now() * 0.0015) * 2;
                
                // Efeito de iluminação pulsante suave
                const pulseIntensity = 0.7 + 0.3 * Math.sin(Date.now() * 0.002);
                const glowIntensity = 0.5 + 0.2 * Math.sin(Date.now() * 0.003);
                
                // Camada de brilho externo (glow difuso)
                ctx.save();
                ctx.shadowBlur = 0;
                
                // Desenhar o glow difuso atrás da nuvem
                for (let i = 0; i < 3; i++) {
                    ctx.beginPath();
                    ctx.ellipse(centerX, centerY - 8, 190, 85, 0, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(80, 150, 255, ${0.08 - i * 0.02})`;
                    ctx.fill();
                }
                
                // ========== PARTES PRINCIPAIS DA NUVEM ==========
                const cloudCircles = [
                    // Camada inferior (base)
                    { x: -95, y: 15, rx: 85, ry: 55, intensity: 0.92 },
                    { x: -45, y: 5, rx: 80, ry: 65, intensity: 0.95 },
                    { x: 0, y: 0, rx: 95, ry: 75, intensity: 1.0 },
                    { x: 45, y: 5, rx: 80, ry: 65, intensity: 0.95 },
                    { x: 90, y: 15, rx: 85, ry: 55, intensity: 0.92 },
                    
                    // Camada média (volume)
                    { x: -115, y: 0, rx: 70, ry: 50, intensity: 0.88 },
                    { x: -70, y: -15, rx: 75, ry: 60, intensity: 0.93 },
                    { x: -25, y: -25, rx: 85, ry: 70, intensity: 0.97 },
                    { x: 25, y: -25, rx: 85, ry: 70, intensity: 0.97 },
                    { x: 70, y: -15, rx: 75, ry: 60, intensity: 0.93 },
                    { x: 110, y: 0, rx: 70, ry: 50, intensity: 0.88 },
                    
                    // Camada superior (topo fofinho)
                    { x: -85, y: -35, rx: 65, ry: 50, intensity: 0.9 },
                    { x: -45, y: -45, rx: 70, ry: 55, intensity: 0.94 },
                    { x: 0, y: -50, rx: 80, ry: 60, intensity: 0.98 },
                    { x: 45, y: -45, rx: 70, ry: 55, intensity: 0.94 },
                    { x: 80, y: -35, rx: 65, ry: 50, intensity: 0.9 },
                    
                    // Camada extra para mais volume
                    { x: -55, y: -60, rx: 55, ry: 45, intensity: 0.86 },
                    { x: 0, y: -65, rx: 65, ry: 50, intensity: 0.92 },
                    { x: 55, y: -60, rx: 55, ry: 45, intensity: 0.86 },
                    
                    // Laterais mais suaves
                    { x: -135, y: 5, rx: 55, ry: 45, intensity: 0.82 },
                    { x: 135, y: 5, rx: 55, ry: 45, intensity: 0.82 },
                ];
                
                // Desenhar todas as partes com gradientes suaves
                for (let circ of cloudCircles) {
                    const px = centerX + circ.x;
                    const py = centerY + circ.y;
                    const rx = circ.rx;
                    const ry = circ.ry;
                    
                    // Gradiente radial para dar volume 3D
                    const gradient = ctx.createRadialGradient(
                        px - rx * 0.25, py - ry * 0.2, rx * 0.2,
                        px, py, rx
                    );
                    
                    const intensity = circ.intensity;
                    
                    // Cores da nuvem - apenas tons de branco, azul e cinza (sem dourado)
                    gradient.addColorStop(0, `rgba(255, 255, 255, ${0.98 * intensity})`);
                    gradient.addColorStop(0.3, `rgba(245, 248, 255, ${0.92 * intensity})`);
                    gradient.addColorStop(0.6, `rgba(210, 225, 250, ${0.82 * intensity})`);
                    gradient.addColorStop(0.85, `rgba(170, 195, 235, ${0.7 * intensity})`);
                    gradient.addColorStop(1, `rgba(140, 165, 215, ${0.55 * intensity})`);
                    
                    ctx.beginPath();
                    ctx.ellipse(px, py, rx, ry, 0, 0, Math.PI * 2);
                    ctx.fillStyle = gradient;
                    ctx.fill();
                    
                    // Brilho suave nas bordas (apenas branco/azul claro)
                    ctx.beginPath();
                    ctx.ellipse(px - 3, py - 4, rx * 0.65, ry * 0.55, 0, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(235, 240, 255, ${0.2 * intensity * pulseIntensity})`;
                    ctx.fill();
                }
                
                // ========== DESTAQUES DE LUZ (HIGHLIGHTS) - SEM DOURADO ==========
                const highlightSpots = [
                    { x: -40, y: -45, rad: 18, intense: 0.8 },
                    { x: 0, y: -55, rad: 22, intense: 0.9 },
                    { x: 35, y: -48, rad: 18, intense: 0.8 },
                    { x: -75, y: -30, rad: 15, intense: 0.7 },
                    { x: 70, y: -32, rad: 15, intense: 0.7 },
                    { x: -20, y: -38, rad: 14, intense: 0.75 },
                    { x: 18, y: -40, rad: 14, intense: 0.75 },
                ];
                
                for (let spot of highlightSpots) {
                    const px = centerX + spot.x;
                    const py = centerY + spot.y;
                    
                    const gradHighlight = ctx.createRadialGradient(
                        px - 5, py - 3, 3,
                        px, py, spot.rad
                    );
                    // Apenas tons de branco e azul, sem dourado
                    gradHighlight.addColorStop(0, `rgba(255, 255, 255, ${0.6 * spot.intense * pulseIntensity})`);
                    gradHighlight.addColorStop(0.5, `rgba(220, 235, 255, ${0.25 * spot.intense * pulseIntensity})`);
                    gradHighlight.addColorStop(1, `rgba(180, 210, 255, 0)`);
                    
                    ctx.beginPath();
                    ctx.ellipse(px, py, spot.rad, spot.rad * 0.7, 0, 0, Math.PI * 2);
                    ctx.fillStyle = gradHighlight;
                    ctx.fill();
                }
                
                // ========== EFEITO DE LUZ VOLUMÉTRICA (GOD RAYS SUAVES) ==========
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                for (let i = 0; i < 12; i++) {
                    const angle = -0.8 + i * 0.15;
                    const xOffset = Math.sin(angle) * 70;
                    const yOffset = -25 - Math.abs(Math.sin(angle)) * 15;
                    
                    const gradRay = ctx.createLinearGradient(
                        centerX + xOffset, centerY + yOffset,
                        centerX + xOffset * 1.5, centerY + yOffset + 60
                    );
                    gradRay.addColorStop(0, `rgba(150, 190, 255, ${0.08 * pulseIntensity})`);
                    gradRay.addColorStop(1, `rgba(80, 130, 230, 0)`);
                    
                    ctx.beginPath();
                    ctx.moveTo(centerX + xOffset - 15, centerY + yOffset);
                    ctx.lineTo(centerX + xOffset + 15, centerY + yOffset);
                    ctx.lineTo(centerX + xOffset * 1.3, centerY + yOffset + 55);
                    ctx.lineTo(centerX + xOffset * 1.1 - 10, centerY + yOffset + 55);
                    ctx.fillStyle = gradRay;
                    ctx.fill();
                }
                ctx.restore();
                
                // ========== BRILHO PERIFÉRICO (AURÉOLA) ==========
                ctx.beginPath();
                ctx.ellipse(centerX, centerY - 8, 210, 95, 0, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(100, 170, 255, ${0.08 + glowIntensity * 0.05})`;
                ctx.fill();
                
                ctx.beginPath();
                ctx.ellipse(centerX, centerY - 5, 180, 80, 0, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(140, 200, 255, ${0.1 + glowIntensity * 0.07})`;
                ctx.fill();
                
                // ========== PARTÍCULAS DE LUZ DENTRO DA NUVEM (APENAS BRANCO/AZUL) ==========
                for (let i = 0; i < 180; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = Math.random() * 140;
                    const x = centerX + Math.cos(angle) * radius * 0.7;
                    const y = centerY - 15 + Math.sin(angle) * radius * 0.5;
                    const size = 1.5 + Math.random() * 4;
                    const alpha = 0.2 + Math.random() * 0.5 * (0.6 + 0.4 * Math.sin(Date.now() * 0.003 + i));
                    
                    ctx.beginPath();
                    ctx.arc(x, y, size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(200, 220, 255, ${alpha})`;
                    ctx.fill();
                    
                    if (Math.random() > 0.7) {
                        ctx.beginPath();
                        ctx.arc(x - 1, y - 1, size * 0.5, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(230, 240, 255, ${alpha * 0.7})`;
                        ctx.fill();
                    }
                }
                
                // ========== CONTORNOS SUAVES E SOMBRAS ==========
                ctx.shadowBlur = 35;
                ctx.shadowColor = "rgba(80, 130, 220, 0.4)";
                for (let circ of cloudCircles.slice(0, 5)) {
                    const px = centerX + circ.x;
                    const py = centerY + circ.y;
                    ctx.beginPath();
                    ctx.ellipse(px, py, circ.rx + 2, circ.ry + 2, 0, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(100, 140, 210, 0.05)`;
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
                
                // ========== DETALHES FINAIS: BRILHOS MINÚSCULOS (APENAS AZUL/BRANCO) ==========
                for (let i = 0; i < 60; i++) {
                    const x = centerX + (Math.random() - 0.5) * 240;
                    const y = centerY - 20 + Math.random() * 70;
                    const size = 1 + Math.random() * 2.5;
                    const alpha = 0.15 + Math.random() * 0.4;
                    
                    ctx.beginPath();
                    ctx.arc(x, y, size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(170, 200, 255, ${alpha * pulseIntensity})`;
                    ctx.fill();
                }
                
                ctx.restore();
            }
            
            // ========== CHUVA DE LETRAS E NÚMEROS ==========
            let rainDrops = [];
            const MAX_RAIN = 420;
            const CHAR_SET = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz";
            
            function randomRange(min, max) {
                return min + Math.random() * (max - min);
            }
            
            function randomChar() {
                return CHAR_SET[Math.floor(Math.random() * CHAR_SET.length)];
            }
            
            function getCloudBottomArea() {
                return {
                    left: cloudX - 160,
                    right: cloudX + 160,
                    topY: cloudY + 20,
                    bottomY: cloudY + 55
                };
            }
            
            function initRain() {
                rainDrops = [];
                const cloudArea = getCloudBottomArea();
                
                for (let i = 0; i < MAX_RAIN; i++) {
                    rainDrops.push({
                        x: randomRange(cloudArea.left - 15, cloudArea.right + 15),
                        y: randomRange(cloudArea.topY - 10, cloudArea.bottomY + 15),
                        char: randomChar(),
                        speed: randomRange(2.0, 5.8),
                        size: randomRange(12, 25),
                        opacity: randomRange(0.6, 0.95),
                        sway: randomRange(-0.3, 0.3),
                        swaySpeed: randomRange(0.01, 0.035),
                        swayPhase: Math.random() * Math.PI * 2
                    });
                }
            }
            
            let groundSplashes = [];
            const MAX_SPLASHES = 70;
            
            function addSplash(x, char) {
                groundSplashes.push({
                    x: x,
                    life: 1.0,
                    decay: randomRange(0.02, 0.04),
                    radius: randomRange(6, 20),
                    char: char,
                    alpha: 0.9
                });
                if (groundSplashes.length > MAX_SPLASHES) groundSplashes.shift();
            }
            
            function updateRain() {
                const cloudArea = getCloudBottomArea();
                
                for (let drop of rainDrops) {
                    drop.y += drop.speed;
                    drop.x += Math.sin(Date.now() * drop.swaySpeed + drop.swayPhase) * 0.2 + drop.sway * 0.05;
                    
                    if (drop.y > height - 12) {
                        addSplash(drop.x, drop.char);
                        
                        drop.y = randomRange(cloudArea.topY - 8, cloudArea.bottomY + 12);
                        drop.x = randomRange(cloudArea.left - 12, cloudArea.right + 12);
                        drop.char = randomChar();
                        drop.speed = randomRange(2.0, 5.8);
                        drop.size = randomRange(12, 25);
                    }
                    
                    if (drop.y < cloudArea.topY - 50) {
                        drop.y = randomRange(cloudArea.topY - 5, cloudArea.bottomY + 10);
                        drop.x = randomRange(cloudArea.left - 10, cloudArea.right + 10);
                    }
                    
                    drop.x = Math.min(Math.max(drop.x, -40), width + 40);
                }
                
                for (let splash of groundSplashes) {
                    splash.life -= splash.decay;
                    splash.radius += 0.65;
                }
                groundSplashes = groundSplashes.filter(s => s.life > 0);
            }
            
            // ========== DESENHO ==========
            function drawBackground() {
                const grad = ctx.createLinearGradient(0, 0, 0, height);
                grad.addColorStop(0, "#030318");
                grad.addColorStop(0.3, "#000000");
                grad.addColorStop(0.7, "#010114");
                grad.addColorStop(1, "#050528");
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, width, height);
                
                // Estrelas distantes
                for (let i = 0; i < 200; i++) {
                    if (i % 3 === 0) {
                        ctx.fillStyle = `rgba(180, 200, 255, ${0.1 + Math.random() * 0.2})`;
                        ctx.beginPath();
                        ctx.arc((i * 173) % width, (i * 97) % (height * 0.5), 1, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
            
            function drawRain() {
                for (let drop of rainDrops) {
                    const flicker = 0.65 + 0.35 * Math.sin(Date.now() * 0.01 + drop.swayPhase);
                    const alpha = drop.opacity * flicker;
                    
                    ctx.font = `${drop.size}px "Courier New", "Fira Code", monospace`;
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = `rgba(0, 180, 255, 0.7)`;
                    ctx.fillStyle = `rgba(70, 210, 255, ${alpha})`;
                    ctx.fillText(drop.char, drop.x, drop.y);
                    
                    // Efeito de estela
                    ctx.fillStyle = `rgba(50, 160, 230, ${alpha * 0.45})`;
                    ctx.fillText(drop.char, drop.x - 1.2, drop.y - drop.size * 0.35);
                    
                    ctx.fillStyle = `rgba(130, 220, 255, ${alpha * 0.3})`;
                    ctx.fillText(drop.char, drop.x + 0.8, drop.y - 1.5);
                }
                ctx.shadowBlur = 0;
            }
            
            function drawGroundEffects() {
                // Chão molhado
                const wetGrad = ctx.createLinearGradient(0, height - 18, 0, height);
                wetGrad.addColorStop(0, "rgba(20, 50, 90, 0.6)");
                wetGrad.addColorStop(1, "rgba(5, 20, 45, 0.85)");
                ctx.fillStyle = wetGrad;
                ctx.fillRect(0, height - 22, width, 22);
                
                // Linha de luz
                ctx.beginPath();
                ctx.strokeStyle = `rgba(70, 190, 255, ${0.5 + 0.2 * Math.sin(Date.now() * 0.003)})`;
                ctx.lineWidth = 2.5;
                ctx.moveTo(0, height - 7);
                ctx.lineTo(width, height - 7);
                ctx.stroke();
                
                // Splashes
                for (let splash of groundSplashes) {
                    const lifeAlpha = splash.life * splash.alpha;
                    
                    ctx.beginPath();
                    ctx.arc(splash.x, height - 6, splash.radius * 0.65, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(70, 180, 255, ${lifeAlpha * 0.55})`;
                    ctx.fill();
                    
                    ctx.beginPath();
                    ctx.arc(splash.x, height - 6, splash.radius * 0.35, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(140, 215, 255, ${lifeAlpha * 0.7})`;
                    ctx.fill();
                    
                    if (splash.char && splash.radius > 8) {
                        ctx.font = `${Math.min(16, splash.radius)}px monospace`;
                        ctx.fillStyle = `rgba(200, 230, 255, ${lifeAlpha * 0.65})`;
                        ctx.fillText(splash.char, splash.x - 5, height - 3);
                    }
                }
                
                // Reflexos das letras no chão
                ctx.save();
                ctx.globalAlpha = 0.45;
                for (let drop of rainDrops) {
                    const distToGround = height - drop.y;
                    if (distToGround < 60 && distToGround > 0) {
                        const refY = height - 6 + (60 - distToGround) * 0.22;
                        const refAlpha = Math.max(0, 0.6 - distToGround / 85) * drop.opacity;
                        ctx.font = `${drop.size * 0.68}px monospace`;
                        ctx.fillStyle = `rgba(100, 200, 250, ${refAlpha})`;
                        ctx.save();
                        ctx.transform(1, 0, 0, -0.45, drop.x, refY);
                        ctx.fillText(drop.char, 0, 0);
                        ctx.restore();
                    }
                }
                ctx.restore();
                
                // Reflexo da luz da nuvem no chão
                const cloudReflection = ctx.createLinearGradient(cloudX - 140, height - 25, cloudX + 140, height - 5);
                cloudReflection.addColorStop(0, "rgba(100, 160, 255, 0)");
                cloudReflection.addColorStop(0.5, `rgba(120, 190, 255, ${0.2 + 0.1 * Math.sin(Date.now() * 0.002)})`);
                cloudReflection.addColorStop(1, "rgba(100, 160, 255, 0)");
                ctx.fillStyle = cloudReflection;
                ctx.fillRect(0, height - 30, width, 30);
            }
            
            // Partículas flutuantes
            let floatingDust = [];
            const MAX_DUST = 100;
            
            function initDust() {
                for (let i = 0; i < MAX_DUST; i++) {
                    floatingDust.push({
                        x: Math.random() * width,
                        y: Math.random() * height * 0.6,
                        size: randomRange(1, 3),
                        alpha: randomRange(0.1, 0.4),
                        vy: randomRange(0.05, 0.25),
                        phase: Math.random() * Math.PI * 2
                    });
                }
            }
            
            function updateDust() {
                for (let d of floatingDust) {
                    d.y -= d.vy;
                    if (d.y < -20) {
                        d.y = height * 0.7;
                        d.x = Math.random() * width;
                    }
                    d.currentAlpha = d.alpha * (0.5 + 0.5 * Math.sin(Date.now() * 0.003 + d.phase));
                }
            }
            
            function drawDust() {
                for (let d of floatingDust) {
                    ctx.beginPath();
                    ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(150, 200, 255, ${d.currentAlpha * 0.4})`;
                    ctx.fill();
                }
            }
            
            // ========== RESIZE E LOOP ==========
            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                cloudX = width * 0.5;
                cloudY = height * cloudBaseY;
                initRain();
            }
            
            function animate() {
                updateRain();
                updateDust();
                
                drawBackground();
                drawBeautifulCloud();
                drawDust();
                drawRain();
                drawGroundEffects();
                
                requestAnimationFrame(animate);
            }
            
            window.addEventListener('resize', () => {
                resizeCanvas();
                initDust();
            });
            
            resizeCanvas();
            initDust();
            animate();
        })();
    </script>
</body>
</html>
