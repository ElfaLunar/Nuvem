<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nuvem Iluminada - Chuva de Letras e Números</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            background-color: black;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .info {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(100, 200, 255, 0.5);
            font-size: 11px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
            background: rgba(0,0,0,0.4);
            padding: 4px 12px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">☁️ CHUVA DE DADOS ☁️ | LETRAS & NÚMEROS</div>

    <script>
        (function() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            let width, height;
            
            // ========== CONFIGURAÇÃO DA NUVEM ==========
            // Nuvem cheia e volumosa - múltiplas camadas para um visual denso
            let cloudX, cloudY;
            const cloudBaseY = 0.25; // 25% da altura do topo
            
            // Partes da nuvem (círculos sobrepostos para criar uma nuvem cheia e fofa)
            const cloudParts = [
                // Camada principal - base larga
                { xOffset: -0.22, yOffset: 0.00, radius: 0.14, intensity: 0.95 },
                { xOffset: -0.12, yOffset: -0.03, radius: 0.15, intensity: 1.0 },
                { xOffset: 0.00, yOffset: -0.06, radius: 0.18, intensity: 1.0 },
                { xOffset: 0.12, yOffset: -0.03, radius: 0.16, intensity: 1.0 },
                { xOffset: 0.23, yOffset: 0.00, radius: 0.14, intensity: 0.95 },
                // Camada superior - mais volume
                { xOffset: -0.18, yOffset: -0.10, radius: 0.12, intensity: 0.9 },
                { xOffset: -0.07, yOffset: -0.13, radius: 0.13, intensity: 0.95 },
                { xOffset: 0.04, yOffset: -0.15, radius: 0.14, intensity: 0.98 },
                { xOffset: 0.15, yOffset: -0.12, radius: 0.12, intensity: 0.92 },
                { xOffset: 0.26, yOffset: -0.08, radius: 0.10, intensity: 0.85 },
                // Camada inferior - para dar mais densidade
                { xOffset: -0.26, yOffset: 0.06, radius: 0.11, intensity: 0.88 },
                { xOffset: -0.15, yOffset: 0.08, radius: 0.12, intensity: 0.92 },
                { xOffset: 0.00, yOffset: 0.05, radius: 0.13, intensity: 0.94 },
                { xOffset: 0.16, yOffset: 0.07, radius: 0.12, intensity: 0.91 },
                { xOffset: 0.28, yOffset: 0.04, radius: 0.10, intensity: 0.86 },
                // Laterais extras
                { xOffset: -0.32, yOffset: -0.02, radius: 0.09, intensity: 0.82 },
                { xOffset: 0.33, yOffset: -0.03, radius: 0.09, intensity: 0.83 }
            ];
            
            // ========== PARTÍCULAS DE CHUVA ==========
            let rainDrops = [];
            const MAX_RAIN = 400; // bastante gotas para uma chuva densa
            const CHAR_SET = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz";
            
            // Velocidades variadas
            const MIN_SPEED = 2.2;
            const MAX_SPEED = 5.5;
            
            // ========== REFLEXOS NO CHÃO ==========
            let groundSplashes = [];
            const MAX_SPLASHES = 60;
            
            // ========== PARTÍCULAS DE BRILHO ==========
            let glowParticles = [];
            const MAX_GLOW = 80;
            
            // ========== VARIÁVEIS DE ANIMAÇÃO ==========
            let timeLight = 0;
            let cloudFloatY = 0;
            let floatDirection = 0.002;
            
            // ========== FUNÇÕES AUXILIARES ==========
            function randomRange(min, max) {
                return min + Math.random() * (max - min);
            }
            
            function randomChar() {
                return CHAR_SET[Math.floor(Math.random() * CHAR_SET.length)];
            }
            
            // Obter a posição Y da base da nuvem (onde as gotas começam)
            function getCloudBottomY() {
                return cloudY + (cloudBaseY * height * 0.15) + Math.sin(cloudFloatY) * 2;
            }
            
            // Obter a largura da nuvem (para distribuir as gotas)
            function getCloudWidth() {
                return width * 0.55; // largura aproximada da nuvem
            }
            
            // Inicializar chuva - todas as gotas começam DENTRO da nuvem
            function initRain() {
                rainDrops = [];
                const cloudBottom = getCloudBottomY();
                const cloudLeft = cloudX - getCloudWidth() / 2;
                const cloudRight = cloudX + getCloudWidth() / 2;
                
                for (let i = 0; i < MAX_RAIN; i++) {
                    // Posição X: dentro da largura da nuvem com variação
                    const x = randomRange(cloudLeft - 15, cloudRight + 15);
                    // Posição Y: começa de dentro da nuvem (parte inferior e meio)
                    const yOffset = randomRange(-35, 25);
                    const y = cloudBottom + yOffset;
                    
                    rainDrops.push({
                        x: x,
                        y: y,
                        char: randomChar(),
                        speed: randomRange(MIN_SPEED, MAX_SPEED),
                        size: randomRange(13, 26),
                        opacity: randomRange(0.55, 0.95),
                        angle: randomRange(-0.8, 0.8), // leve inclinação para dar naturalidade
                        wobble: Math.random() * Math.PI * 2,
                        wobbleSpeed: randomRange(0.01, 0.04)
                    });
                }
            }
            
            // Adicionar splash no chão
            function addSplash(x, intensity = 1.0, char = '') {
                groundSplashes.push({
                    x: x,
                    life: 1.0,
                    decay: randomRange(0.018, 0.035),
                    radius: randomRange(6, 18),
                    char: char,
                    alpha: 0.8
                });
                if (groundSplashes.length > MAX_SPLASHES) {
                    groundSplashes.shift();
                }
            }
            
            // Atualizar chuva
            function updateRain() {
                const cloudBottom = getCloudBottomY();
                const cloudLeft = cloudX - getCloudWidth() / 2 - 20;
                const cloudRight = cloudX + getCloudWidth() / 2 + 20;
                
                for (let i = 0; i < rainDrops.length; i++) {
                    const drop = rainDrops[i];
                    
                    // Movimento vertical com leve oscilação lateral
                    drop.y += drop.speed;
                    drop.x += Math.sin(Date.now() * drop.wobbleSpeed + drop.wobble) * 0.15;
                    
                    // Verificar se atingiu o chão
                    if (drop.y > height - 12) {
                        addSplash(drop.x, drop.speed / MAX_SPEED, drop.char);
                        
                        // Reset: volta para DENTRO da nuvem
                        drop.y = cloudBottom + randomRange(-25, 20);
                        drop.x = randomRange(cloudLeft, cloudRight);
                        drop.char = randomChar();
                        drop.speed = randomRange(MIN_SPEED, MAX_SPEED);
                        drop.size = randomRange(13, 26);
                        drop.opacity = randomRange(0.6, 0.95);
                    }
                    
                    // Se por algum motivo a gota subiu demais, reposicionar na nuvem
                    if (drop.y < cloudBottom - 60) {
                        drop.y = cloudBottom + randomRange(-20, 15);
                        drop.x = randomRange(cloudLeft, cloudRight);
                    }
                    
                    // Manter X dentro de limites razoáveis
                    if (drop.x < -50) drop.x = -50;
                    if (drop.x > width + 50) drop.x = width + 50;
                }
                
                // Atualizar splashes
                for (let i = 0; i < groundSplashes.length; i++) {
                    const splash = groundSplashes[i];
                    splash.life -= splash.decay;
                    splash.radius += 0.7;
                }
                groundSplashes = groundSplashes.filter(s => s.life > 0);
            }
            
            // ========== FUNÇÕES DE DESENHO ==========
            
            // Fundo preto com gradiente profundo
            function drawBackground() {
                const grad = ctx.createLinearGradient(0, 0, 0, height);
                grad.addColorStop(0, "#020214");
                grad.addColorStop(0.4, "#000000");
                grad.addColorStop(0.8, "#030318");
                grad.addColorStop(1, "#050520");
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, width, height);
                
                // Estrelas/brilhos distantes (muito sutis)
                ctx.fillStyle = "rgba(255,255,200,0.15)";
                for (let i = 0; i < 150; i++) {
                    if (i % 2 === 0) continue; // só algumas
                    ctx.beginPath();
                    ctx.arc((i * 131) % width, (i * 253) % (height * 0.6), 1, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            // Desenhar nuvem CHEIA e ILUMINADA
            function drawCloud() {
                const centerX = cloudX;
                const centerY = cloudY + Math.sin(cloudFloatY) * 3;
                
                // Iluminação pulsante
                const glowPulse = 0.65 + 0.35 * Math.sin(timeLight * 0.012);
                const edgeGlow = 0.5 + 0.3 * Math.sin(timeLight * 0.008);
                
                // Desenhar cada parte da nuvem com gradientes ricos
                for (let part of cloudParts) {
                    const px = centerX + (part.xOffset * width);
                    const py = centerY + (part.yOffset * height * 0.22);
                    const radius = part.radius * Math.min(width, height) * 0.48;
                    
                    // Gradiente radial para volume
                    const grad = ctx.createRadialGradient(
                        px - radius * 0.25, py - radius * 0.2, radius * 0.15,
                        px, py, radius
                    );
                    
                    const intensity = part.intensity;
                    const brightness = 0.8 + glowPulse * 0.3;
                    
                    grad.addColorStop(0, `rgba(255, 255, 250, ${0.95 * intensity})`);
                    grad.addColorStop(0.3, `rgba(210, 225, 255, ${0.9 * intensity})`);
                    grad.addColorStop(0.6, `rgba(150, 185, 240, ${0.75 * intensity})`);
                    grad.addColorStop(1, `rgba(100, 130, 200, ${0.55 * intensity})`);
                    
                    ctx.beginPath();
                    ctx.arc(px, py, radius, 0, Math.PI * 2);
                    ctx.fillStyle = grad;
                    ctx.fill();
                    
                    // Brilho externo (glow)
                    ctx.save();
                    ctx.shadowBlur = 28;
                    ctx.shadowColor = `rgba(80, 160, 255, ${0.35 + edgeGlow * 0.2})`;
                    ctx.beginPath();
                    ctx.arc(px, py, radius * 0.92, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(140, 200, 255, ${0.18 + glowPulse * 0.1})`;
                    ctx.fill();
                    ctx.restore();
                }
                
                // Adicionar destaques internos (partículas brilhantes dentro da nuvem)
                for (let i = 0; i < 120; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const dist = Math.random() * 0.38 * Math.min(width, height);
                    const px = centerX + Math.cos(angle) * dist;
                    const py = centerY + Math.sin(angle) * dist * 0.6 - 8;
                    const size = 1.5 + Math.random() * 5;
                    const alpha = 0.3 + Math.random() * 0.5 * (0.6 + 0.4 * Math.sin(timeLight * 0.02 + i));
                    
                    ctx.beginPath();
                    ctx.arc(px, py, size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 245, 200, ${alpha})`;
                    ctx.fill();
                    ctx.shadowBlur = 10;
                    ctx.fillStyle = `rgba(255, 210, 120, ${alpha * 0.7})`;
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
                
                // Borda luminosa suave na base da nuvem (onde a chuva cai)
                ctx.beginPath();
                const baseY = centerY + 18;
                ctx.ellipse(centerX, baseY, getCloudWidth() / 2.2, 12, 0, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(100, 180, 255, ${0.2 + 0.1 * Math.sin(timeLight * 0.02)})`;
                ctx.fill();
            }
            
            // Desenhar chuva com efeito de brilho
            function drawRain() {
                for (let drop of rainDrops) {
                    const flicker = 0.7 + 0.3 * Math.sin(Date.now() * 0.008 + drop.wobble);
                    const alpha = drop.opacity * flicker;
                    
                    ctx.font = `${drop.size}px "Courier New", "Fira Code", monospace`;
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = `rgba(0, 180, 255, 0.8)`;
                    ctx.fillStyle = `rgba(80, 210, 255, ${alpha})`;
                    ctx.fillText(drop.char, drop.x, drop.y);
                    
                    // Efeito de rastro (cauda)
                    ctx.fillStyle = `rgba(50, 170, 230, ${alpha * 0.4})`;
                    ctx.fillText(drop.char, drop.x - 1.2, drop.y - drop.size * 0.4);
                    
                    // Pequeno brilho extra
                    ctx.fillStyle = `rgba(180, 240, 255, ${alpha * 0.3})`;
                    ctx.fillText(drop.char, drop.x + 1, drop.y - 2);
                }
                ctx.shadowBlur = 0;
            }
            
            // Desenhar reflexos no chão (splashes + reflexo das letras)
            function drawGroundEffects() {
                // Piso molhado com gradiente
                const wetGrad = ctx.createLinearGradient(0, height - 15, 0, height);
                wetGrad.addColorStop(0, "rgba(30, 60, 100, 0.5)");
                wetGrad.addColorStop(1, "rgba(10, 30, 60, 0.8)");
                ctx.fillStyle = wetGrad;
                ctx.fillRect(0, height - 18, width, 18);
                
                // Linha de luz no chão
                ctx.beginPath();
                ctx.strokeStyle = `rgba(0, 200, 255, ${0.4 + 0.2 * Math.sin(timeLight * 0.02)})`;
                ctx.lineWidth = 2;
                ctx.moveTo(0, height - 8);
                ctx.lineTo(width, height - 8);
                ctx.stroke();
                
                // Splashes (respingos)
                for (let splash of groundSplashes) {
                    const lifeAlpha = splash.life * splash.alpha;
                    const radius = splash.radius;
                    
                    // Anel externo
                    ctx.beginPath();
                    ctx.arc(splash.x, height - 7, radius * 0.7, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(70, 180, 255, ${lifeAlpha * 0.5})`;
                    ctx.fill();
                    
                    // Anel interno
                    ctx.beginPath();
                    ctx.arc(splash.x, height - 7, radius * 0.35, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(150, 220, 255, ${lifeAlpha * 0.7})`;
                    ctx.fill();
                    
                    // Pequeno brilho central
                    if (splash.char) {
                        ctx.font = `${Math.min(18, radius)}px monospace`;
                        ctx.fillStyle = `rgba(255, 240, 180, ${lifeAlpha * 0.6})`;
                        ctx.fillText(splash.char, splash.x - 5, height - 4);
                    }
                }
                
                // Reflexo espelhado das letras que estão próximas ao chão
                ctx.save();
                ctx.globalAlpha = 0.4;
                for (let drop of rainDrops) {
                    const distToGround = height - drop.y;
                    if (distToGround < 55 && distToGround > 0) {
                        const refY = height - 8 + (55 - distToGround) * 0.25;
                        const refAlpha = Math.max(0, 0.55 - distToGround / 90) * drop.opacity;
                        ctx.font = `${drop.size * 0.7}px monospace`;
                        ctx.fillStyle = `rgba(100, 210, 255, ${refAlpha})`;
                        ctx.save();
                        ctx.transform(1, 0, 0, -0.5, drop.x, refY);
                        ctx.fillText(drop.char, 0, 0);
                        ctx.restore();
                    }
                }
                ctx.restore();
                
                // Brilho difuso abaixo da nuvem (reflexo da luz da nuvem no chão)
                const groundGlow = ctx.createLinearGradient(cloudX - 120, height - 20, cloudX + 120, height - 5);
                groundGlow.addColorStop(0, "rgba(80, 150, 255, 0)");
                groundGlow.addColorStop(0.5, `rgba(100, 180, 255, ${0.18 + 0.08 * Math.sin(timeLight * 0.015)})`);
                groundGlow.addColorStop(1, "rgba(80, 150, 255, 0)");
                ctx.fillStyle = groundGlow;
                ctx.fillRect(0, height - 25, width, 25);
            }
            
            // Partículas de luz flutuantes ao redor da nuvem
            function initGlowParticles() {
                glowParticles = [];
                for (let i = 0; i < MAX_GLOW; i++) {
                    glowParticles.push({
                        x: randomRange(0, width),
                        y: randomRange(cloudY - 80, cloudY + 100),
                        radius: randomRange(1, 4),
                        alpha: randomRange(0.2, 0.7),
                        speedY: randomRange(0.1, 0.6),
                        speedX: randomRange(-0.15, 0.15),
                        phase: randomRange(0, Math.PI * 2)
                    });
                }
            }
            
            function updateGlowParticles() {
                for (let p of glowParticles) {
                    p.y -= p.speedY;
                    p.x += p.speedX;
                    
                    // Reposicionar ao redor da nuvem
                    if (p.y < cloudY - 100 || p.y > cloudY + 120 || p.x < -50 || p.x > width + 50) {
                        p.y = cloudY + randomRange(-40, 80);
                        p.x = randomRange(cloudX - getCloudWidth() / 1.5, cloudX + getCloudWidth() / 1.5);
                        p.alpha = randomRange(0.2, 0.6);
                    }
                    
                    p.currentAlpha = p.alpha * (0.5 + 0.5 * Math.sin(Date.now() * 0.005 + p.phase));
                }
            }
            
            function drawGlowParticles() {
                for (let p of glowParticles) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(180, 220, 255, ${p.currentAlpha * 0.5})`;
                    ctx.fill();
                    ctx.shadowBlur = 6;
                    ctx.fillStyle = `rgba(220, 240, 255, ${p.currentAlpha * 0.3})`;
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
            }
            
            // ========== RESIZE E ANIMAÇÃO ==========
            function resizeAndReset() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                
                cloudX = width * 0.5;
                cloudY = height * cloudBaseY;
                
                initRain();
                initGlowParticles();
            }
            
            // Loop principal
            let animationFrame;
            function animate() {
                if (!ctx) return;
                
                timeLight++;
                cloudFloatY += floatDirection;
                if (Math.abs(cloudFloatY) > 0.7) floatDirection *= -1;
                
                updateRain();
                updateGlowParticles();
                
                drawBackground();
                drawCloud();
                drawGlowParticles();
                drawRain();
                drawGroundEffects();
                
                // Pequeno efeito de neblina no chão
                ctx.fillStyle = "rgba(0, 10, 30, 0.2)";
                ctx.fillRect(0, height - 40, width, 40);
                
                animationFrame = requestAnimationFrame(animate);
            }
            
            window.addEventListener('resize', () => {
                resizeAndReset();
            });
            
            resizeAndReset();
            animate();
        })();
    </script>
</body>
</html>
